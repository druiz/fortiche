# Fortiche — generated Xcode project. Edit this file, then run `xcodegen generate`.
#
# Rename points (app is codenamed "Fortiche"): PRODUCT_NAME below, bundle ids,
# iCloud container, app group. Everything else derives from these.
name: Fortiche
options:
  bundleIdPrefix: com.davidruiz
  deploymentTarget:
    iOS: "27.0"
    watchOS: "27.0"
  createIntermediateGroups: true

packages:
  FortichePack:
    path: FortichePack

settings:
  base:
    SWIFT_VERSION: "6.0"
    MARKETING_VERSION: 1.0.0
    CURRENT_PROJECT_VERSION: 1
    CODE_SIGN_STYLE: Automatic
    DEVELOPMENT_TEAM: M9MD9VA4G3
    # Debug builds normally put code in <App>.debug.dylib behind a stub main
    # binary. linkd cannot parse the stub ("Failed to resolve package data …
    # Invalid argument"), refuses to index the bundle's App Intents metadata,
    # and every Live Activity button tap then fails with "There is no metadata
    # for <Intent>". Keep all code in the main executable so debug builds
    # behave like release builds. Costs: slower SwiftUI-preview relaunches.
    ENABLE_DEBUG_DYLIB: NO

targets:
  Fortiche:
    type: application
    platform: iOS
    # `Shared` holds sources compiled into BOTH the app and the widget
    # extension (Live Activity intents need a copy in each binary).
    sources: [Fortiche, Shared]
    dependencies:
      - package: FortichePack
      - target: ForticheWatch
      - target: ForticheWidgets
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.davidruiz.fortiche
        TARGETED_DEVICE_FAMILY: 1
        SUPPORTED_PLATFORMS: "iphoneos iphonesimulator"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        # User-selectable alternates (Settings → App Icon). Names must match
        # the AppIcon-<Name>.appiconset entries emitted by
        # Scripts/generate_icon.swift and the list in SettingsView.
        ASSETCATALOG_COMPILER_ALTERNATE_APPICON_NAMES: AppIcon-Ember AppIcon-Forest AppIcon-Midnight AppIcon-Ivory
    info:
      path: Fortiche/Info.plist
      properties:
        CFBundleDisplayName: Fortiche
        UILaunchScreen: {}
        UISupportedInterfaceOrientations: [UIInterfaceOrientationPortrait]
        NSHealthShareUsageDescription: Fortiche reads health data such as body weight and heart rate to personalize your training.
        NSHealthUpdateUsageDescription: Fortiche saves your strength workouts to Apple Health so they count toward your rings.
        NSSupportsLiveActivities: true
        # Standard HTTPS-only exemption; answers the export-compliance
        # question automatically for every upload.
        ITSAppUsesNonExemptEncryption: false
    entitlements:
      path: Fortiche/Fortiche.entitlements
      properties:
        com.apple.developer.healthkit: true
        com.apple.developer.healthkit.background-delivery: true
        com.apple.developer.icloud-services: [CloudKit]
        com.apple.developer.icloud-container-identifiers: [iCloud.com.davidruiz.fortiche]
        com.apple.security.application-groups: [group.com.davidruiz.fortiche]
        com.apple.developer.siri: true

  ForticheWatch:
    type: application
    platform: watchOS
    sources: [ForticheWatch]
    dependencies:
      - package: FortichePack
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.davidruiz.fortiche.watchkitapp
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
    info:
      path: ForticheWatch/Info.plist
      properties:
        CFBundleDisplayName: Fortiche
        WKApplication: true
        WKCompanionAppBundleIdentifier: com.davidruiz.fortiche
        WKBackgroundModes: [workout-processing]
        NSHealthShareUsageDescription: Fortiche reads heart rate during workouts to show live effort and zones.
        NSHealthUpdateUsageDescription: Fortiche saves your strength workouts to Apple Health.
    entitlements:
      path: ForticheWatch/ForticheWatch.entitlements
      properties:
        com.apple.developer.healthkit: true

  ForticheWidgets:
    type: app-extension
    platform: iOS
    sources: [ForticheWidgets, Shared]
    dependencies:
      - package: FortichePack
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.davidruiz.fortiche.widgets
        SUPPORTED_PLATFORMS: "iphoneos iphonesimulator"
    info:
      path: ForticheWidgets/Info.plist
      properties:
        CFBundleDisplayName: Fortiche
        NSExtension:
          NSExtensionPointIdentifier: com.apple.widgetkit-extension
    entitlements:
      path: ForticheWidgets/ForticheWidgets.entitlements
      properties:
        com.apple.security.application-groups: [group.com.davidruiz.fortiche]

schemes:
  Fortiche:
    build:
      targets: { Fortiche: all }
    run:
      config: Debug
    test:
      config: Debug
  ForticheWatch:
    build:
      targets: { ForticheWatch: all }
    run:
      config: Debug
